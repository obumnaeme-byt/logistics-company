<style>

.header {

}

<script>

const trackingData = {
  trackingNumber: "IGL8980982627",
  status: "Ready for Pickup",
  origin: "Syria",
  destination: "Brazil",
  history: [
    {
      date: "April 25, 2026",
      location: "Syria",
      info:"In transit",
      message: "Shipment dispatched from origin facility"
    },
    {
      date: "April 27, 2026",
      location: "Brazil",
      info: "Arrived",
      message: "Arrived at destination facility"
    },
    {
      date: "April 27, 2026",
      location: "Brazil",
     info: "Hello Edivan Mendes Farias Folha, your package from Inter Global Logistics is now ready!",
      message: "Ready for pickup"
    }
  ]
};

function displayTracking() {
  const resultDiv = document.getElementById("result");

  let html = `
    <div class="header">
      <h2>Shipment Tracking</h2>
      <div class="status">${trackingData.status}</div>
    </div>

    <div class="details">
      <strong>Tracking Number:</strong> ${trackingData.trackingNumber}<br>
      <strong>Origin:</strong> ${trackingData.origin}<br>
      <strong>Destination:</strong> ${trackingData.destination}
    </div>

    <div class="timeline">
  `;

  trackingData.history.forEach(event => {
    html += `
      <div class="event">
        <strong>${event.message}</strong>
        <span>${event.date} • ${event.location}</span>
        <li>${event.info}</li>
      </div>
    `;
  });

  html += `</div>`;
  resultDiv.innerHTML = html;
}

displayTracking();
</script>
